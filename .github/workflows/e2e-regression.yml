name: E2E Anti-Régression Portail Client

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright — Portail Client
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL || 'test@nivra-telecom.ca' }}
      VITE_E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      VITE_PAYPAL_CLIENT_ID: ${{ secrets.VITE_PAYPAL_CLIENT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E portal regression suite
        run: npx playwright test e2e/portal-login.spec.ts e2e/portal-change-plan.spec.ts e2e/portal-paypal-payment.spec.ts e2e/portal-invoice-pdf.spec.ts e2e/portal-idle-logout.spec.ts
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:8080

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-${{ github.run_number }}
          path: e2e/screenshots/
          retention-days: 14
