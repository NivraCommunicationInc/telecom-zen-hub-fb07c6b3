name: TypeScript Typecheck

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: TypeScript typecheck
        run: npx tsc --noEmit
