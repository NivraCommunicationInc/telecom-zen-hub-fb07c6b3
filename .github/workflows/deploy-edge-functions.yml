name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:        # Manuel seulement — déclencher après upgrade Pro Supabase
  # push sur main réactivé après upgrade Pro (2026-06-14)
  # push:
  #   branches: [main]
  #   paths:
  #     - 'supabase/functions/**'

jobs:
  deploy:
    name: Deploy to Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions
        run: |
          supabase functions deploy \
            --project-ref lacxnbjvcyvhrttprkxr \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
