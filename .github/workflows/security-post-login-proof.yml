name: Security Post-Login Proof

on:
  workflow_dispatch:

jobs:
  security_post_login_proof:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run security post-login token tests (must not skip)
        env:
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_CLIENT_EMAIL: ${{ secrets.E2E_CLIENT_EMAIL }}
          E2E_CLIENT_PASSWORD: ${{ secrets.E2E_CLIENT_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Running post-login security tests..."
          npx playwright test e2e/security-token-check.spec.ts --reporter=line 2>&1 | tee playwright-security.log

          echo "----- PLAYWRIGHT EVIDENCE (parsed) -----"
          # If tests were skipped, Playwright's line reporter prints "skipped".
          SKIPPED_LINES=$(grep -Ei "skipped" -c playwright-security.log || true)
          echo "Skipped lines in log: ${SKIPPED_LINES}"
          if [ "${SKIPPED_LINES}" -ne 0 ]; then
            echo "FAIL: Found skipped tests in log; acceptance gate requires 0 skipped."
            exit 1
          fi

          echo "PASS: No skipped tests detected in logs (acceptance gate requirement)."

      - name: Upload proof artifacts (log + report)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-post-login-proof
          if-no-files-found: warn
          path: |
            playwright-security.log
            playwright-report/**
            test-results/**
