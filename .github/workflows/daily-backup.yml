name: Daily Database Backup → Cloudflare R2

on:
  schedule:
    - cron: '30 2 * * *'   # 02:30 UTC daily
  workflow_dispatch:         # manual trigger from GitHub UI

env:
  SUPABASE_URL: https://lacxnbjvcyvhrttprkxr.supabase.co

jobs:
  backup:
    name: REST export + auth → R2
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Set date variable
        id: vars
        run: echo "DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Export tables via REST API
        env:
          SVCKEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          mkdir -p /tmp/backup
          TABLES=(
            orders
            billing_customers
            billing_subscriptions
            billing_invoices
            billing_payments
            field_payment_intents
            profiles
            user_roles
            field_quotes
            site_settings
            admin_notification_settings
            billing_system_alerts
            email_queue
            account_adjustments
            products
          )
          for TABLE in "${TABLES[@]}"; do
            echo "Exporting $TABLE..."
            curl -sf \
              "${{ env.SUPABASE_URL }}/rest/v1/$TABLE?select=*&limit=100000" \
              -H "Authorization: Bearer $SVCKEY" \
              -H "apikey: $SVCKEY" \
              -o "/tmp/backup/${TABLE}.json" || echo "WARNING: $TABLE skipped"
          done

      - name: Export Auth users
        env:
          SVCKEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -sf \
            "${{ env.SUPABASE_URL }}/auth/v1/admin/users?per_page=1000" \
            -H "Authorization: Bearer $SVCKEY" \
            -H "apikey: $SVCKEY" \
            -o "/tmp/backup/auth_users.json"

      - name: Bundle into archive
        run: |
          DATE="${{ steps.vars.outputs.DATE }}"
          tar -czf /tmp/nivra-backup-${DATE}.tar.gz -C /tmp/backup .
          echo "Archive: $(du -sh /tmp/nivra-backup-${DATE}.tar.gz | cut -f1)"

      - name: Install rclone
        run: curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Upload to R2 via rclone
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: https://${{ secrets.CF_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          RCLONE_CONFIG_R2_NO_CHECK_BUCKET: "true"
        run: |
          DATE="${{ steps.vars.outputs.DATE }}"
          rclone copyto "/tmp/nivra-backup-${DATE}.tar.gz" \
            "r2:${{ secrets.CF_R2_BUCKET }}/nivra-backup-${DATE}.tar.gz" \
            --s3-no-head
          echo "Uploaded: nivra-backup-${DATE}.tar.gz"

      - name: Prune backups older than 90 days
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: https://${{ secrets.CF_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          RCLONE_CONFIG_R2_NO_CHECK_BUCKET: "true"
        run: |
          CUTOFF=$(date -u -d '90 days ago' +%Y-%m-%d)
          rclone lsf "r2:${{ secrets.CF_R2_BUCKET }}/" --s3-no-check-bucket 2>/dev/null | \
          while IFS= read -r FILE; do
            FILE_DATE=$(echo "$FILE" | grep -oP '\d{4}-\d{2}-\d{2}' || true)
            if [[ -n "$FILE_DATE" && "$FILE_DATE" < "$CUTOFF" ]]; then
              echo "Pruning: $FILE"
              rclone deletefile "r2:${{ secrets.CF_R2_BUCKET }}/$FILE" --s3-no-check-bucket
            fi
          done

      - name: Alert on failure
        if: failure()
        env:
          SVCKEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -f -X POST \
            "${{ env.SUPABASE_URL }}/rest/v1/billing_system_alerts" \
            -H "Authorization: Bearer $SVCKEY" \
            -H "apikey: $SVCKEY" \
            -H "Content-Type: application/json" \
            -d "{\"alert_type\":\"backup_failed\",\"entity_type\":\"github_actions_r2\",\"severity\":\"critical\",\"details\":{\"date\":\"${{ steps.vars.outputs.DATE }}\",\"run_id\":\"${{ github.run_id }}\"},\"resolved\":false}" \
            || true
