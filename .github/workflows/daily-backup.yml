name: Daily Database Backup → Cloudflare R2

on:
  schedule:
    - cron: '30 2 * * *'   # 02:30 UTC — after Supabase pg_cron backup at 02:00
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  backup:
    name: pg_dump + auth export → R2
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Install postgresql-client
        run: sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Set date variable
        id: vars
        run: echo "DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Dump public schema
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGSSLMODE: require
        run: |
          pg_dump \
            --host=db.lacxnbjvcyvhrttprkxr.supabase.co \
            --port=5432 \
            --username=postgres \
            --dbname=postgres \
            --schema=public \
            --format=custom \
            --compress=9 \
            --no-password \
            --file=/tmp/nivra-${{ steps.vars.outputs.DATE }}.dump

      - name: Export Auth users via Supabase API
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -sf \
            "https://lacxnbjvcyvhrttprkxr.supabase.co/auth/v1/admin/users?per_page=1000" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -o /tmp/auth-users-${{ steps.vars.outputs.DATE }}.json

      - name: Configure AWS CLI for Cloudflare R2
        run: |
          aws configure set aws_access_key_id     "${{ secrets.CF_R2_ACCESS_KEY_ID }}"
          aws configure set aws_secret_access_key "${{ secrets.CF_R2_SECRET_ACCESS_KEY }}"
          aws configure set default.region        auto

      - name: Upload dump to R2
        run: |
          aws s3 cp /tmp/nivra-${{ steps.vars.outputs.DATE }}.dump \
            "s3://${{ secrets.CF_R2_BUCKET }}/db/nivra-${{ steps.vars.outputs.DATE }}.dump" \
            --endpoint-url "https://${{ secrets.CF_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"

      - name: Upload auth export to R2
        run: |
          aws s3 cp /tmp/auth-users-${{ steps.vars.outputs.DATE }}.json \
            "s3://${{ secrets.CF_R2_BUCKET }}/auth/auth-users-${{ steps.vars.outputs.DATE }}.json" \
            --endpoint-url "https://${{ secrets.CF_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"

      - name: Prune backups older than 90 days
        run: |
          R2_URL="https://${{ secrets.CF_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          CUTOFF=$(date -u -d '90 days ago' +%Y-%m-%d)
          for PREFIX in db auth; do
            aws s3 ls "s3://${{ secrets.CF_R2_BUCKET }}/$PREFIX/" \
              --endpoint-url "$R2_URL" 2>/dev/null | awk '{print $4}' | \
            while IFS= read -r FILE; do
              FILE_DATE=$(echo "$FILE" | grep -oP '\d{4}-\d{2}-\d{2}' || true)
              if [[ -n "$FILE_DATE" && "$FILE_DATE" < "$CUTOFF" ]]; then
                aws s3 rm "s3://${{ secrets.CF_R2_BUCKET }}/$PREFIX/$FILE" --endpoint-url "$R2_URL"
              fi
            done
          done

      - name: Alert on failure
        if: failure()
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -sf -X POST \
            "https://lacxnbjvcyvhrttprkxr.supabase.co/rest/v1/billing_system_alerts" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"alert_type\":\"backup_failed\",\"entity_type\":\"github_actions_r2\",\"severity\":\"critical\",\"details\":{\"date\":\"${{ steps.vars.outputs.DATE }}\",\"run_id\":\"${{ github.run_id }}\"},\"resolved\":false}"
