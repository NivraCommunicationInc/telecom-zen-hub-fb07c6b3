name: Daily Database Backup → Cloudflare R2

on:
  schedule:
    - cron: '30 2 * * *'   # 02:30 UTC daily
  workflow_dispatch:         # manual trigger from GitHub UI

env:
  SUPABASE_URL: https://lacxnbjvcyvhrttprkxr.supabase.co
  R2_ENDPOINT: https://${{ secrets.CF_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
  R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}

jobs:
  backup:
    name: REST export + auth → R2
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Set date variable
        id: vars
        run: echo "DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Export tables via REST API
        env:
          SVCKEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          mkdir -p /tmp/backup
          TABLES=(
            orders
            billing_customers
            billing_subscriptions
            billing_invoices
            billing_payments
            billing_invoices
            field_payment_intents
            profiles
            user_roles
            field_quotes
            site_settings
            admin_notification_settings
            billing_system_alerts
            email_queue
            account_adjustments
            products
          )
          for TABLE in "${TABLES[@]}"; do
            echo "Exporting $TABLE..."
            curl -sf \
              "${{ env.SUPABASE_URL }}/rest/v1/$TABLE?select=*&limit=100000" \
              -H "Authorization: Bearer $SVCKEY" \
              -H "apikey: $SVCKEY" \
              -H "Prefer: count=exact" \
              -o "/tmp/backup/${TABLE}.json" || echo "WARNING: $TABLE failed"
          done

      - name: Export Auth users
        env:
          SVCKEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -sf \
            "${{ env.SUPABASE_URL }}/auth/v1/admin/users?per_page=1000" \
            -H "Authorization: Bearer $SVCKEY" \
            -H "apikey: $SVCKEY" \
            -o "/tmp/backup/auth_users.json"

      - name: Bundle into archive
        run: |
          DATE="${{ steps.vars.outputs.DATE }}"
          tar -czf /tmp/nivra-backup-${DATE}.tar.gz -C /tmp/backup .
          echo "Archive size: $(du -sh /tmp/nivra-backup-${DATE}.tar.gz | cut -f1)"

      - name: Configure AWS CLI for Cloudflare R2
        run: |
          aws configure set aws_access_key_id     "${{ secrets.CF_R2_ACCESS_KEY_ID }}"
          aws configure set aws_secret_access_key "${{ secrets.CF_R2_SECRET_ACCESS_KEY }}"
          aws configure set default.region        auto

      - name: Upload archive to R2
        run: |
          DATE="${{ steps.vars.outputs.DATE }}"
          aws s3 cp /tmp/nivra-backup-${DATE}.tar.gz \
            "s3://${{ env.R2_BUCKET }}/nivra-backup-${DATE}.tar.gz" \
            --endpoint-url "${{ env.R2_ENDPOINT }}"
          echo "Uploaded: nivra-backup-${DATE}.tar.gz"

      - name: Prune backups older than 90 days
        run: |
          CUTOFF=$(date -u -d '90 days ago' +%Y-%m-%d)
          aws s3 ls "s3://${{ env.R2_BUCKET }}/" \
            --endpoint-url "${{ env.R2_ENDPOINT }}" 2>/dev/null | awk '{print $4}' | \
          while IFS= read -r FILE; do
            FILE_DATE=$(echo "$FILE" | grep -oP '\d{4}-\d{2}-\d{2}' || true)
            if [[ -n "$FILE_DATE" && "$FILE_DATE" < "$CUTOFF" ]]; then
              echo "Pruning old backup: $FILE"
              aws s3 rm "s3://${{ env.R2_BUCKET }}/$FILE" \
                --endpoint-url "${{ env.R2_ENDPOINT }}"
            fi
          done

      - name: Alert on failure
        if: failure()
        env:
          SVCKEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -sf -X POST \
            "${{ env.SUPABASE_URL }}/rest/v1/billing_system_alerts" \
            -H "Authorization: Bearer $SVCKEY" \
            -H "apikey: $SVCKEY" \
            -H "Content-Type: application/json" \
            -d "{\"alert_type\":\"backup_failed\",\"entity_type\":\"github_actions_r2\",\"severity\":\"critical\",\"details\":{\"date\":\"${{ steps.vars.outputs.DATE }}\",\"run_id\":\"${{ github.run_id }}\"},\"resolved\":false}"
