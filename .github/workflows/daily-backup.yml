name: Daily Database Backup → GitHub Artifacts

on:
  schedule:
    - cron: '30 2 * * *'   # 02:30 UTC daily
  workflow_dispatch:

env:
  SUPABASE_URL: https://lacxnbjvcyvhrttprkxr.supabase.co

jobs:
  backup:
    name: Export Supabase → GitHub Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Set date variable
        id: vars
        run: echo "DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Export tables via REST API
        env:
          SVCKEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          mkdir -p /tmp/backup
          TABLES=(
            orders
            billing_customers
            billing_subscriptions
            billing_invoices
            billing_payments
            field_payment_intents
            profiles
            user_roles
            field_quotes
            site_settings
            admin_notification_settings
            billing_system_alerts
            email_queue
            account_adjustments
            products
          )
          FAILED=0
          for TABLE in "${TABLES[@]}"; do
            HTTP=$(curl -s -w "%{http_code}" \
              "${{ env.SUPABASE_URL }}/rest/v1/$TABLE?select=*&limit=100000" \
              -H "Authorization: Bearer $SVCKEY" \
              -H "apikey: $SVCKEY" \
              -o "/tmp/backup/${TABLE}.json")
            if [[ "$HTTP" == "200" ]]; then
              ROWS=$(cat "/tmp/backup/${TABLE}.json" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d) if isinstance(d,list) else 1)" 2>/dev/null || echo "?")
              echo "✓ $TABLE → $ROWS rows"
            else
              echo "✗ $TABLE → HTTP $HTTP (skipped)"
              echo "[]" > "/tmp/backup/${TABLE}.json"
              FAILED=$((FAILED+1))
            fi
          done
          echo "Done — $FAILED table(s) skipped"

      - name: Export Auth users
        env:
          SVCKEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          HTTP=$(curl -sf -w "%{http_code}" \
            "${{ env.SUPABASE_URL }}/auth/v1/admin/users?per_page=1000" \
            -H "Authorization: Bearer $SVCKEY" \
            -H "apikey: $SVCKEY" \
            -o "/tmp/backup/auth_users.json")
          echo "auth_users → HTTP $HTTP"

      - name: Bundle archive
        run: |
          DATE="${{ steps.vars.outputs.DATE }}"
          tar -czf /tmp/nivra-backup-${DATE}.tar.gz -C /tmp/backup .
          echo "Size: $(du -sh /tmp/nivra-backup-${DATE}.tar.gz | cut -f1)"
          echo "Tables: $(ls /tmp/backup | wc -l) files"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nivra-backup-${{ steps.vars.outputs.DATE }}
          path: /tmp/nivra-backup-${{ steps.vars.outputs.DATE }}.tar.gz
          retention-days: 90
          if-no-files-found: error

      - name: Alert on failure
        if: failure()
        env:
          SVCKEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -f -X POST \
            "${{ env.SUPABASE_URL }}/rest/v1/billing_system_alerts" \
            -H "Authorization: Bearer $SVCKEY" \
            -H "apikey: $SVCKEY" \
            -H "Content-Type: application/json" \
            -d "{\"alert_type\":\"backup_failed\",\"entity_type\":\"github_actions\",\"severity\":\"critical\",\"details\":{\"date\":\"${{ steps.vars.outputs.DATE }}\",\"run_id\":\"${{ github.run_id }}\"},\"resolved\":false}" \
            || true
