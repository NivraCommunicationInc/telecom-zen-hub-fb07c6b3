name: P0 Mobile Overflow Proof

on:
  workflow_dispatch:

jobs:
  mobile_overflow_proof:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install --frozen-lockfile || npm install

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Prepare environment
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p e2e/screenshots

      - name: Run P0 mobile overflow test (public pages only)
        env:
          VITE_E2E_MODE: "true"
        run: npx playwright test e2e/mobile-overflow-check.spec.ts --grep "Homepage|Internet|Public pages" --reporter=line

      - name: Upload proof artifacts (screenshots + logs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p0-mobile-overflow-proof
          if-no-files-found: warn
          path: |
            e2e/screenshots/**
            playwright-report/**
            test-results/**
